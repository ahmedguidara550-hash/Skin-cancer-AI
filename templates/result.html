<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title>Résultat - AI Med Portal</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <nav class="navbar navbar-dark bg-primary">
            <div class="container">
                <span class="navbar-brand mb-0 h1">🩺 AI Med Portal</span>
                <a href="{{ url_for('list_patients') }}" class="btn btn-light text-primary">Voir tout l'historique</a>
                <a href="{{url_for('dashboard')}}" class="btn btn-light text-primary">Retour au Tableau de bord</a>
                
                
            </div>
        </nav>

        <div class="container mt-5 text-centre">
            <h2>Résultat de l'Analyse 🧠</h2>
            <div class="card shadow-sm mx-auto mt-4" style="max-width: 500px;">
                <img src="/{{ image_path}}" class="card-img-top p-3 rounded" alt="Lésion cutanée">

                <div class="card-body">
                    <h4 class="card-title">Diagnostic de l'IA :
                        {% if result == 'Malignant' %}
                            <span class="text-danger fw-bold">{{ result }}</span>
                        {% else %}
                            <span class="text-success fw-bold">{{ result }}</span>
                        {% endif %}
                    </h4>

                    <p class="card-text fs-5">Confience du modèle : <strong>{{ (probability * 100) | round(2) }} %</strong></p>
                </div>
            </div>
        </div>
    </body>
</html>
