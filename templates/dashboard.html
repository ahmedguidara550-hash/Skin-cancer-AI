<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title>Tableau de Bord - Skin Cancer AI</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <nav class="navbar navbar-dark bg-primary">
            <div class="container">
                <span class="navbar-brand mb-0 h1">🩺 AI Med Portal</span>
                <a href="{{url_for('logout')}}" class="btn btn-danger">déconnexion</a>
            </div>
        </nav>
        <div class="container mt-5">
            <h2>Bienvenue, Dr. {{username}} ! 👋</h2>
            <p class="text-muted">Utilisez cet outil pour analyser une image de lésion cutanée.</p>

            <div class="card mt-4 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title text-primary">Nouvelle Analyse</h5>
                    <form action="/predict" method="post" enctype="multipart/form-data">
                        <div class="mb-3">
                           <label>Nom du Patient :</label>
                           <input type="text" name="name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                           <label>Âge :</label>
                           <input type="number" name="age" class="form-control" required>
                        </div>
                        <div class="mb-3 mt-3">
                            <label for="file" class="form-label">Sélectionnez une image de la peau (JPG, PNG)</label>
                            <input class="form-control" type="file" id="file" name="file" accept="image/*" required>
                        </div>
                        <button type="submit" class="btn btn-success">Analyser l'image avec l'IA 🧠</button>
                        <div class="mt-3">
                             <a href="{{ url_for('list_patients') }}" class="btn btn-info text-white">
                            📂 Consulter l'historique des diagnostics
                             </a>
                         </div>
                    </form>
                </div>
            </div>
        </div>
    </body>
</html>
