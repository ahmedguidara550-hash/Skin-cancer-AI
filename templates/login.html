<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title>Connexion - Skin cancer AI</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            body { background-color: #f8f9fa; display: flex; align-items: center; height: 100vh; }
        .login-container { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
        </style>
    </head>
    <body>
        <div class="container login-container">
            <h2 class="text-centre mb-4 text-primary">🩺 AI Med Portal</h2>

            {% if msg %}
            <div class="alert alert-danger" role="alert">
                {{msg}}
            </div>
            {% endif %}
            <form action="{{ url_for('login') }}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Nom d'utilisateur</label>
                    <input type="text" class="form-control" name="username" id="username" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Mot de passe</label>
                    <input type="password" class="form-control" name="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Se connecter</button>
                <div class="text-center mt-3">
                     <p>Nouveau docteur ? <a href="{{ url_for('signup') }}" class="btn btn-outline-primary btn-sm mt-1">Créer un compte</a></p>
                </div>
            </form>
        </div>
    </body>
</html>
