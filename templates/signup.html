<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription - Skin Cancer AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .signup-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    </style>
</head>
<body>

<div class="signup-card">
    <h3 class="text-center mb-4">🩺 Créer un compte Médecin</h3>
    
    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form action="/signup" method="POST">
        <div class="mb-3">
            <label>Nom d'utilisateur :</label>
            <input type="text" name="username" class="form-control" required placeholder="Dr. Dupont">
        </div>
        <div class="mb-3">
            <label>Mot de passe :</label>
            <input type="password" name="password" class="form-control" required placeholder="Votre mot de passe">
        </div>
        <button type="submit" class="btn btn-success w-100">S'inscrire</button>
    </form>

    <div class="text-center mt-3">
        <p>Déjà inscrit ? <a href="{{ url_for('login') }}">Se connecter</a></p>
    </div>
</div>

</body>
</html>
